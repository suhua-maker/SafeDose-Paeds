<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KKP9 Paediatric Dose Auto Calculation Sheet</title>
    <style>
        :root { --primary: #0056b3; --accent: #d93025; --bg: #f8fafc; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); padding: 20px; }
        .container { max-width: 1200px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        
        .header-bar { display: flex; flex-wrap: wrap; gap: 20px; background: #eef2f7; padding: 25px; border-radius: 10px; align-items: flex-end; margin-bottom: 25px; border: 1px solid #d1d9e6; }
        .field { display: flex; flex-direction: column; gap: 8px; }
        label { font-size: 11px; font-weight: bold; color: #475569; text-transform: uppercase; letter-spacing: 0.5px; }
        input { padding: 12px; border: 2px solid #cbd5e1; border-radius: 8px; font-size: 18px; width: 120px; text-align: center; font-weight: bold; }

        .btn-calculate { background: var(--primary); color: white; border: none; padding: 14px 30px; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 10px; transition: transform 0.1s; }
        .btn-calculate:hover { background: #004494; }
        .btn-calculate:active { transform: scale(0.97); }

        .table-container { overflow-x: auto; border-radius: 8px; border: 1px solid #e2e8f0; }
        table { width: 100%; border-collapse: collapse; min-width: 1000px; }
        th { background: var(--primary); color: white; padding: 15px; text-align: left; font-size: 13px; text-transform: uppercase; position: sticky; top: 0; }
        td { padding: 15px; border-bottom: 1px solid #f1f5f9; font-size: 14px; color: #1e293b; }
        tr:nth-child(even) { background: #f8fafc; }
        
        .res-mg { font-weight: bold; color: var(--primary); font-size: 1.1em; }
        .res-ml { font-weight: 800; color: var(--accent); background: #fff5f5; padding: 6px 10px; border-radius: 6px; border: 1px solid #fed7d7; font-size: 1.2em; }
        .med-name { font-weight: bold; color: #0f172a; }
        .rule-badge { font-size: 10px; color: #64748b; background: #f1f5f9; padding: 2px 5px; border-radius: 4px; display: block; margin-top: 5px; font-style: italic; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="margin-top:0; color: #1e293b; border-bottom: 2px solid var(--primary); padding-bottom: 10px;">
        KKP9 Paediatric Dose Auto Calculation Sheet
    </h2>

    <div class="header-bar">
        <div class="field"><label>Weight (kg)</label><input type="number" id="wt" step="0.1" placeholder="0.0"></div>
        <div class="field"><label>Age (Yrs)</label><input type="number" id="ageY" placeholder="0"></div>
        <div class="field"><label>Age (Mths)</label><input type="number" id="ageM" placeholder="0"></div>
        
        <button class="btn-calculate" onclick="runCalc()">
            <span>🔄</span> CALCULATE
        </button>
        
        <button onclick="window.location.reload()" style="background:none; border:none; color:#64748b; text-decoration:underline; cursor:pointer; font-size:14px;">Reset All</button>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th style="width: 25%">Medication Name</th>
                    <th>Strength</th>
                    <th>Recommended Dose (mg)</th>
                    <th>Recommended Dose (mL)</th>
                    <th>Frequency</th>
                    <th>Notes</th>
                </tr>
            </thead>
            <tbody id="medTableBody"></tbody>
        </table>
    </div>
</div>

<script>
    const medicationRegistry = [
        { id: "pcm_susp", name: "Paracetamol Suspension", str: "250mg/5mL", mg: 250, ml: 5, freq: "TDS/QID", note: "Adult dose=1000mg/dose." },
        { id: "pcm_supp", name: "Paracetamol Suppository", str: "125mg / 250mg", mg: 0, ml: 0, freq: "PRN", note: "Max 4 doses/24h" },
        { id: "ibu", name: "Ibuprofen Syrup", str: "100mg/5mL", mg: 100, ml: 5, freq: "TDS", note: "Post-meal" },
        { id: "amox", name: "Amoxicillin Syr", str: "125mg/5mL", mg: 125, ml: 5, freq: "TDS", note: "5-7 days course" },
        { id: "cpm", name: "Chlorpheniramine", str: "2mg/5mL", mg: 2, ml: 5, freq: "TDS", note: "Max 12mg/day" },
        { id: "alben", name: "Albendazole Susp", str: "200mg/5mL", mg: 200, ml: 5, freq: "STAT", note: "Age-dependent dose" }
    ];

    function init() {
        const body = document.getElementById('medTableBody');
        body.innerHTML = medicationRegistry.map((m) => `
            <tr>
                <td class="med-name">${m.name}</td>
                <td>${m.str}</td>
                <td class="res-mg"><span id="mg-${m.id}">0</span> mg</td>
                <td class="res-ml"><span id="ml-${m.id}">0</span></td>
                <td>${m.freq}</td>
                <td><small>${m.note}</small><span class="rule-badge" id="rule-${m.id}">Pending...</span></td>
            </tr>
        `).join('');
    }

    function runCalc() {
        const w = parseFloat(document.getElementById('wt').value) || 0;
        const y = parseFloat(document.getElementById('ageY').value) || 0;

        if (w <= 0) { 
            alert("Please key in weight first!"); 
            return; 
        }

        medicationRegistry.forEach(med => {
            let finalMg = 0;
            let finalMl = "0.00";
            let ruleText = "";

            if (med.id === "pcm_susp") {
                finalMg = w * 15;
                finalMl = ((finalMg / 250) * 5).toFixed(2) + " mL";
                ruleText = "Formula: 15mg/kg";
            } 
            
            else if (med.id === "pcm_supp") {
                finalMg = w * 30;
                finalMl = "-";
                ruleText = "Formula: 30mg/kg";
            }

            else if (med.id === "ibu") {
                finalMg = w * 10;
                finalMl = ((finalMg / 100) * 5).toFixed(2) + " mL";
                ruleText = "Formula: 10mg/kg";
            }

            else if (med.id === "alben") {
                if (y < 2) {
                    finalMg = 200; finalMl = "5.00 mL";
                    ruleText = "Rule: < 2yrs (200mg)";
                } else {
                    finalMg = 400; finalMl = "10.00 mL";
                    ruleText = "Rule: >= 2yrs (400mg)";
                }
            }

            else if (med.id === "cpm") {
                finalMg = w * 0.1;
                finalMl = ((finalMg / 2) * 5).toFixed(2) + " mL";
                ruleText = "Formula: 0.1mg/kg";
            }

            else {
                finalMg = w * 15;
                finalMl = ((finalMg / med.mg) * med.ml).toFixed(2) + " mL";
                ruleText = "Standard Calculation";
            }

            document.getElementById(`mg-${med.id}`).innerText = finalMg.toFixed(1);
            document.getElementById(`ml-${med.id}`).innerText = finalMl;
            document.getElementById(`rule-${med.id}`).innerText = ruleText;
        });
    }

    window.onload = init;
</script>
</body>
</html>
