<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KKPj9 Paediatric Dose Auto Calculation Sheet</title>
    <style>
        :root { --primary: #0056b3; --accent: #d93025; --bg: #f8fafc; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); padding: 20px; }
        .container { max-width: 1450px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        
        .header-bar { display: flex; flex-wrap: wrap; gap: 20px; background: #eef2f7; padding: 25px; border-radius: 10px; align-items: flex-end; margin-bottom: 25px; border: 1px solid #d1d9e6; }
        .field { display: flex; flex-direction: column; gap: 8px; }
        label { font-size: 11px; font-weight: bold; color: #475569; text-transform: uppercase; letter-spacing: 0.5px; }
        input { padding: 12px; border: 2px solid #cbd5e1; border-radius: 8px; font-size: 18px; width: 120px; text-align: center; font-weight: bold; }

        .search-container { margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
        #searchBox { width: 100%; max-width: 400px; padding: 12px; border: 2px solid #cbd5e1; border-radius: 8px; font-size: 16px; text-align: left; font-weight: normal; }
        #searchBox:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 0 3px rgba(0,86,179,0.1); }

        .btn-calculate { background: var(--primary); color: white; border: none; padding: 14px 30px; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 10px; transition: transform 0.1s; }
        .btn-calculate:hover { background: #004494; }

        .table-container { overflow-x: auto; border-radius: 8px; border: 1px solid #e2e8f0; }
        table { width: 100%; border-collapse: collapse; min-width: 1350px; }
        th { background: var(--primary); color: white; padding: 15px; text-align: left; font-size: 11px; text-transform: uppercase; position: sticky; top: 0; letter-spacing: 0.5px; }
        td { padding: 15px; border-bottom: 1px solid #f1f5f9; font-size: 14px; color: #1e293b; vertical-align: top; }
        tr:nth-child(even) { background: #f8fafc; }
        
        .res-mg { font-weight: bold; color: var(--primary); font-size: 1.1em; }
        .res-ml { font-weight: 800; color: var(--accent); background: #fff5f5; padding: 6px 10px; border-radius: 6px; border: 1px solid #fed7d7; font-size: 1.2em; display: inline-block; }
        .med-name { font-weight: bold; color: #0f172a; }
        .dose-range-text { color: #475569; font-size: 0.82em; line-height: 1.5; white-space: pre-line; min-width: 350px; }
        .rule-badge { font-size: 10px; color: #64748b; background: #f1f5f9; padding: 2px 5px; border-radius: 4px; display: block; margin-top: 5px; font-style: italic; }
        .notes-text { font-size: 0.85em; white-space: pre-line; color: #1e293b; }
        .contra { color: #721c24; background-color: #f8d7da; border: 1px solid #f5c6cb; padding: 4px 8px; border-radius: 4px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="margin-top:0; color: #1e293b; border-bottom: 2px solid var(--primary); padding-bottom: 10px;">
        KKPj9 Paediatric Dose Auto Calculation Sheet
    </h2>

    <div class="header-bar">
        <div class="field"><label>Weight (kg)</label><input type="number" id="wt" step="0.1" placeholder="0.0"></div>
        <div class="field"><label>Age (Yrs)</label><input type="number" id="ageY" placeholder="0"></div>
        <div class="field"><label>Age (Mths)</label><input type="number" id="ageM" placeholder="0"></div>
        
        <button class="btn-calculate" onclick="runCalc()">
            <span>🔄</span> CALCULATE
        </button>
        
        <button onclick="window.location.reload()" style="background:none; border:none; color:#64748b; text-decoration:underline; cursor:pointer; font-size:14px;">Reset All</button>
    </div>

    <div class="search-container">
        <span>🔍</span>
        <input type="text" id="searchBox" placeholder="Search medication name..." onkeyup="filterMeds()">
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th style="width: 15%">Medication Name</th>
                    <th style="width: 10%">Strength</th>
                    <th style="width: 25%">Dose Range</th>
                    <th style="width: 13%">RECOMMENDED DOSE (MG)</th>
                    <th style="width: 13%">RECOMMENDED DOSE (ML)</th>
                    <th style="width: 10%">FREQUENCY</th>
                    <th>Notes</th>
                </tr>
            </thead>
            <tbody id="medTableBody"></tbody>
        </table>
    </div>
</div>

<script>
    const medicationRegistry = [
        { id: "pcm_susp", name: "Paracetamol Suspension", str: "250mg/5mL", range: "FUKKM\nCHILD:\nup to 1 year: 60 - 120 mg.\n1 - 5 years: 120 - 240 mg.\n6 - 12 years: 240 - 480 mg per dose.\nRepeat every 4 - 6 hours when necessary.", mg: 250, ml: 5, freq: "TDS/QID", note: "Max 4 doses in 24 hours.\nAdult dose=1000mg/dose." },
        { id: "pcm_supp", name: "Paracetamol Suppository", str: "125mg / 250mg", range: "FUKKM\nADULT & CHILDREN > 12y: 500mg-1g every 4-6h\nCHILD 6-12y: 250-500mg; 1-5y: 125-250mg;\n3-11m: 80mg every 4-6h PRN.", mg: 0, ml: 0, freq: "PRN", note: "Maximum 4 doses in 24 hours.\nInfants <3m: 10mg/kg (5mg/kg if jaundiced)." },
        { id: "cpm_syr", name: "Chlorpheniramine Syrup", str: "2mg/5mL", range: "FUKKM\nCHILD 2-5y: 1mg 4-6 hourly (max 6mg/day)\n6-12y: 2mg 4-6 hourly (max 12mg/day)", mg: 2, ml: 5, freq: "TDS", note: "Contraindicated for use in children under 2-year-old" },
        { id: "dph_syr", name: "Diphenhydramine Syrup", str: "7mg/5mL", range: "FUKKM\nCHILD 6-12y: 2.5 to 5 ml; 2-5y: 2.5 ml 2-3 times daily\nNOT for children < 2 years", mg: 7, ml: 5, freq: "TDS", note: "Contraindicated for use in children under 2-year-old" },
        { id: "prom_syr", name: "Promethazine Syrup", str: "5mg/5mL", range: "FUKKM\nCHILD 2-5y: 5-15mg daily; 5-10y: 10-25mg daily", mg: 5, ml: 5, freq: "TDS", note: "Contraindicated for use in children under 2-year-old." },
        { id: "lorat_syr", name: "Loratadine Syrup", str: "5mg/5mL", range: "FUKKM: CHILD >6y: 10mg OD; 2-6y: 5mg OD\n>30kg: 10mg OD; <=30kg: 5mg OD", mg: 5, ml: 5, freq: "OD", note: "-" },
        { id: "brom_syr", name: "Bromhexine Syrup", str: "4mg/5mL", range: "FUKKM\nWeight: 0.3mg/kg/day 8 hourly\nAge: 6-12y: 4mg TDS; 2-6y: 2mg TDS; <2y: 1mg TDS", mg: 4, ml: 5, freq: "TDS", note: "-" },
        { id: "pred_syr", name: "Prednisolone Syrup", str: "2.5mg/5mL", range: "FUKKM\nCHILD: 0.5 - 2 mg/kg/day in divided doses every 6 - 8 hours or as a single daily", mg: 2.5, ml: 5, freq: "OD", note: "-" },
        { id: "lactulose", name: "Lactulose", str: "3.3g/5ml", range: "FUKKM\nCHILD 0.5 ml/kg/dose once or twice daily.", mg: 3300, ml: 5, freq: "OD/BD", note: "-" }
    ];

    function init() {
        const body = document.getElementById('medTableBody');
        body.innerHTML = medicationRegistry.map((m) => `
            <tr class="med-row">
                <td class="med-name">${m.name}</td>
                <td>${m.str}</td>
                <td class="dose-range-text">${m.range}</td>
                <td class="res-mg"><span id="mg-${m.id}">0</span></td>
                <td class="res-ml"><span id="ml-${m.id}">0</span></td>
                <td>${m.freq}</td>
                <td class="notes-text">${m.note}<span class="rule-badge" id="rule-${m.id}">Pending...</span></td>
            </tr>
        `).join('');
    }

    function filterMeds() {
        const input = document.getElementById('searchBox').value.toLowerCase();
        const rows = document.getElementsByClassName('med-row');
        for (let i = 0; i < rows.length; i++) {
            const medName = rows[i].querySelector('.med-name').innerText.toLowerCase();
            rows[i].style.display = medName.includes(input) ? "" : "none";
        }
    }

    function runCalc() {
        const w = parseFloat(document.getElementById('wt').value) || 0;
        const y = parseFloat(document.getElementById('ageY').value) || 0;

        if (w <= 0) { alert("Please key in weight first!"); return; }

        medicationRegistry.forEach(med => {
            let finalMg = "-", finalMl = "0.00", ruleText = "";

            if (med.id === "pcm_susp") {
                finalMg = (w * 15).toFixed(1) + " mg";
                finalMl = ((w * 15 / 250) * 5).toFixed(2) + " mL";
                ruleText = "Formula: 15mg/kg";
            } 
            else if (med.id === "pcm_supp") {
                finalMg = (w * 30).toFixed(1) + " mg";
                finalMl = "-";
                ruleText = "Formula: 30mg/kg";
            }
            else if (med.id === "pred_syr") {
                let mgVal = Math.min(30, (1 * w));
                finalMg = mgVal.toFixed(1) + " mg";
                finalMl = ((mgVal / 2.5) * 5).toFixed(2) + " mL";
                ruleText = "Formula: 1mg/kg (Max 30mg)";
            }
            else if (med.id === "dph_syr") {
                if (y < 2) { finalMg = "CONTRA"; finalMl = "CONTRA"; ruleText = "Age < 2yrs"; }
                else if (y < 6) { finalMl = Math.min((w * 5 / 7), 2.5).toFixed(2) + " mL"; ruleText = "Age 2-6 (Max 2.5mL)"; }
                else { finalMl = Math.min((w * 5 / 7), 5).toFixed(2) + " mL"; ruleText = "Age 6+ (Max 5mL)"; }
            }
            else if (med.id === "prom_syr") {
                if (y < 2) { finalMg = "CONTRA"; finalMl = "CONTRA"; ruleText = "Age < 2yrs"; }
                else {
                    let mgVal = Math.min(0.3 * w, 8);
                    finalMg = mgVal.toFixed(1) + " mg";
                    finalMl = ((mgVal / 5) * 5).toFixed(2) + " mL";
                    ruleText = "Formula: 0.3mg/kg (Max 8mg)";
                }
            }
            else if (med.id === "lorat_syr") {
                let doseVal = (y > 6) ? (w <= 30 ? 5 : 10) : 5;
                finalMg = doseVal.toFixed(1) + " mg";
                finalMl = doseVal.toFixed(2) + " mL";
                ruleText = (y > 6) ? `Age > 6y (${w <= 30 ? '<=30kg' : '>30kg'})` : "Age <= 6y (Standard)";
            }
            else if (med.id === "brom_syr") {
                if (y < 2) { finalMg = "0.96 mg"; finalMl = "1.20 mL"; ruleText = "Age < 2y (Fixed)"; }
                else if (y < 6) { 
                    let mgV = Math.min(0.3 * w, 2);
                    finalMg = mgV.toFixed(1) + " mg"; finalMl = (mgV * 5 / 4).toFixed(2) + " mL"; ruleText = "Age 2-6 (Max 2mg)"; 
                }
                else { 
                    let mgV = Math.min(0.3 * w, 4);
                    finalMg = mgV.toFixed(1) + " mg"; finalMl = (mgV * 5 / 4).toFixed(2) + " mL"; ruleText = "Age 6+ (Max 4mg)"; 
                }
            }
            else if (med.id === "cpm_syr") {
                if (y < 2) { finalMg = "CONTRA"; finalMl = "CONTRA"; ruleText = "Age < 2yrs"; } 
                else if (y < 6) {
                    let mgV = Math.min(0.1 * w, 1);
                    finalMg = mgV.toFixed(1) + " mg"; finalMl = (mgV * 5 / 2).toFixed(2) + " mL"; ruleText = "Age 2-6 (Max 1mg)";
                } else {
                    let mgV = Math.min(0.1 * w, 2);
                    finalMg = mgV.toFixed(1) + " mg"; finalMl = (mgV * 5 / 2).toFixed(2) + " mL"; ruleText = "Age 6+ (Max 2mg)";
                }
            }
            else if (med.id === "lactulose") {
                finalMg = "-";
                finalMl = Math.min(15, (0.5 * w)).toFixed(2) + " mL";
                ruleText = "Formula: 0.5mL/kg (Max 15mL)";
            }

            const mgEl = document.getElementById(`mg-${med.id}`);
            const mlEl = document.getElementById(`ml-${med.id}`);
            mgEl.innerText = finalMg;
            mlEl.innerText = finalMl;
            
            if (finalMg.includes("CONTRA")) {
                mgEl.classList.add("contra"); mlEl.classList.add("contra");
            } else {
                mgEl.classList.remove("contra"); mlEl.classList.remove("contra");
            }
            document.getElementById(`rule-${med.id}`).innerText = ruleText;
        });
    }

    window.onload = init;
</script>
</body>
</html>
