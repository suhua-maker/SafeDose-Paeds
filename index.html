<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dose Calculator</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding: 20px; background: #f4f7f6; }
        .card { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        .input-group { margin-bottom: 1rem; }
        label { display: block; margin-bottom: 0.5rem; font-weight: bold; }
        input { width: 100%; padding: 0.5rem; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .result-box { margin-top: 1.5rem; padding: 1rem; background: #e7f3ff; border-radius: 4px; text-align: center; }
        #result { font-size: 1.2rem; font-weight: bold; color: #007bff; }
    </style>
</head>
<body>

<div class="card">
    <h2>Dose Calculator</h2>
    
    <div class="input-group">
        <label>Patient Weight (kg)</label>
        <input type="number" id="weight" placeholder="e.g. 70" oninput="calculateDose()">
    </div>

    <div class="input-group">
        <label>Dosage (mg/kg)</label>
        <input type="number" id="dosage" placeholder="e.g. 5" oninput="calculateDose()">
    </div>

    <div class="input-group">
        <label>Concentration (mg/mL)</label>
        <input type="number" id="concentration" placeholder="e.g. 50" oninput="calculateDose()">
    </div>

    <div class="result-box">
        <div>Total Volume to Administer:</div>
        <div id="result">0 mL</div>
    </div>
</div>

<script>
    function calculateDose() {
        const weight = document.getElementById('weight').value;
        const dosage = document.getElementById('dosage').value;
        const concentration = document.getElementById('concentration').value;
        const resultDisplay = document.getElementById('result');

        if (weight && dosage && concentration && concentration > 0) {
            // Formula: (Weight * Dosage) / Concentration
            const totalDose = (weight * dosage) / concentration;
            resultDisplay.innerText = totalDose.toFixed(2) + " mL";
        } else {
            resultDisplay.innerText = "0 mL";
        }
    }
</script>

</body>
</html>
