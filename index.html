<script>
    const medicationRegistry = [
        { name: "Paracetamol Suspension", str: "250mg / 5mL", mg: 250, ml: 5, doseKg: 15, freq: "TDS/QID", note: "Max of 4 doses in 24 hours. Adult dose is 1g/dose" },
        // Fixed: Suppositories use mg: 1 and ml: 0 to signify they aren't liquid
        { name: "Paracetamol Suppository", str: "125mg & 250mg", mg: 0, ml: 0, doseKg: 30, freq: "PRN", note: "Max of 4 doses in 24 hours. Round to nearest suppository size." },
        { name: "Ibuprofen", str: "100mg / 5mL", mg: 100, ml: 5, doseKg: 10, freq: "TDS", note: "Post-meal" },
        { name: "Chlorpheniramine (Piriton)", str: "2mg / 5mL", mg: 2, ml: 5, doseKg: 0.1, freq: "TDS", note: "Max 12mg/day" },
        { name: "Amoxicillin", str: "125mg / 5mL", mg: 125, ml: 5, doseKg: 15, freq: "TDS", note: "Complete course" },
        { name: "Amoxicillin (Forte)", str: "250mg / 5mL", mg: 250, ml: 5, doseKg: 15, freq: "TDS", note: "Standard dose" },
        { name: "Cephalexin", str: "125mg / 5mL", mg: 125, ml: 5, doseKg: 12.5, freq: "BD/QID", note: "Skin/Soft tissue" },
        { name: "Cloxacillin", str: "125mg / 5mL", mg: 125, ml: 5, doseKg: 12.5, freq: "QID", note: "Empty stomach" },
        { name: "Metronidazole", str: "200mg / 5mL", mg: 200, ml: 5, doseKg: 7.5, freq: "TDS", note: "Anaerobic infx" },
        { name: "Salbutamol", str: "2mg / 5mL", mg: 2, ml: 5, doseKg: 0.1, freq: "TDS", note: "Monitor HR" },
        { name: "Promethazine", str: "5mg / 5mL", mg: 5, ml: 5, doseKg: 0.25, freq: "BD/TDS", note: "Antihistamine" },
        { name: "Cetirizine", str: "5mg / 5mL", mg: 5, ml: 5, doseKg: 0.25, freq: "OD", note: "6mo and above" },
        { name: "Loratadine", str: "5mg / 5mL", mg: 5, ml: 5, doseKg: 0.25, freq: "OD", note: "2yrs and above" },
        { name: "Guaiphenesin", str: "100mg / 5mL", mg: 100, ml: 5, doseKg: 5, freq: "TDS", note: "Expectorant" },
        { name: "Dextromethorphan", str: "15mg / 5mL", mg: 15, ml: 5, doseKg: 0.2, freq: "TDS", note: "Antitussive" }
    ];

    function buildTable() {
        const table = document.getElementById('medList');
        table.innerHTML = medicationRegistry.map((m, i) => `
            <tr>
                <td class="med-name">${m.name}</td>
                <td>${m.str}</td>
                <td><span id="mg-${i}" class="val-mg">0 mg</span></td>
                <td><span id="ml-${i}" class="val-ml">0 mL</span></td>
                <td>${m.freq}</td>
                <td><small>${m.note}</small></td>
            </tr>
        `).join('');
    }

    function calc() {
        const w = parseFloat(document.getElementById('wt').value) || 0;
        const y = document.getElementById('ageY').value || 0;
        const m = document.getElementById('ageM').value || 0;

        document.getElementById('vAge').innerText = y + "y " + m + "m";
        document.getElementById('vWt').innerText = w;

        medicationRegistry.forEach((med, i) => {
            const mgSpan = document.getElementById(`mg-${i}`);
            const mlSpan = document.getElementById(`ml-${i}`);

            if (w > 0) {
                const totalMg = w * med.doseKg;
                mgSpan.innerText = totalMg.toFixed(1) + " mg";

                // Check if it's a liquid (ml > 0) or solid (ml = 0)
                if (med.ml > 0) {
                    const conc = med.mg / med.ml;
                    const totalMl = totalMg / conc;
                    mlSpan.innerText = totalMl.toFixed(2) + " mL";
                } else {
                    // Display note for suppositories/solids instead of 0.00 mL
                    mlSpan.innerText = "See Note";
                }
            } else {
                mgSpan.innerText = "0 mg";
                mlSpan.innerText = "0 mL";
            }
        });
    }

    function resetAll() {
        document.getElementById('wt').value = '';
        document.getElementById('ageY').value = '';
        document.getElementById('ageM').value = '';
        calc();
    }

    window.onload = buildTable;
</script>
