<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>KKP9 Dose Calculator</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f0f2f5; }
        .box { max-width: 900px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .input-area { display: flex; gap: 20px; background: #eef2f7; padding: 20px; border-radius: 8px; margin-bottom: 20px; align-items: center; }
        .field { display: flex; flex-direction: column; }
        label { font-size: 12px; font-weight: bold; margin-bottom: 5px; color: #444; }
        input { padding: 10px; width: 100px; font-size: 18px; border: 1px solid #0056b3; border-radius: 5px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background: #0056b3; color: white; padding: 12px; text-align: left; }
        td { padding: 12px; border-bottom: 1px solid #ddd; font-size: 15px; }
        .res-mg { font-weight: bold; color: #0056b3; font-size: 1.2em; }
        .res-ml { font-weight: bold; color: #d93025; font-size: 1.3em; background: #fff5f5; padding: 3px 8px; border-radius: 4px; }
        #search { width: 100%; padding: 12px; margin-bottom: 10px; border: 2px solid #0056b3; border-radius: 6px; box-sizing: border-box; }
    </style>
</head>
<body>

<div class="box">
    <h2 style="color:#0056b3; margin-top:0;">KKP9 Pediatric Dose Sheet (2025)</h2>
    
    <div class="input-area">
        <div class="field">
            <label>WEIGHT (kg)</label>
            <input type="number" id="weightInput" step="0.1" placeholder="0.0" oninput="runAllCalculations()">
        </div>
        <div class="field">
            <label>AGE (Y)</label>
            <input type="number" id="ageY" placeholder="0">
        </div>
        <div class="field">
            <label>AGE (M)</label>
            <input type="number" id="ageM" placeholder="0">
        </div>
        <button onclick="location.reload()" style="padding:10px; cursor:pointer;">Reset</button>
    </div>

    <input type="text" id="search" placeholder="Type drug name to filter..." onkeyup="filterTable()">

    <table id="doseTable">
        <thead>
            <tr>
                <th>Medication</th>
                <th>Strength</th>
                <th>Dose (mg)</th>
                <th>Dose (mL)</th>
                <th>Frequency</th>
            </tr>
        </thead>
        <tbody>
            <tr class="drug-row">
                <td>Paracetamol 250</td>
                <td>250mg / 5mL</td>
                <td><span class="mg-out" data-dosekg="15">0</span> mg</td>
                <td><span class="ml-out" data-strmg="250" data-strml="5" data-dosekg="15">0</span> mL</td>
                <td>TDS/QID</td>
            </tr>
            <tr class="drug-row">
                <td>Ibuprofen</td>
                <td>100mg / 5mL</td>
                <td><span class="mg-out" data-dosekg="10">0</span> mg</td>
                <td><span class="ml-out" data-strmg="100" data-strml="5" data-dosekg="10">0</span> mL</td>
                <td>TDS</td>
            </tr>
            <tr class="drug-row">
                <td>Amoxicillin 125</td>
                <td>125mg / 5mL</td>
                <td><span class="mg-out" data-dosekg="15">0</span> mg</td>
                <td><span class="ml-out" data-strmg="125" data-strml="5" data-dosekg="15">0</span> mL</td>
                <td>TDS</td>
            </tr>
            <tr class="drug-row">
                <td>Chlorpheniramine</td>
                <td>2mg / 5mL</td>
                <td><span class="mg-out" data-dosekg="0.1">0</span> mg</td>
                <td><span class="ml-out" data-strmg="2" data-strml="5" data-dosekg="0.1">0</span> mL</td>
                <td>TDS</td>
            </tr>
            <tr class="drug-row">
                <td>Cetirizine</td>
                <td>5mg / 5mL</td>
                <td><span class="mg-out" data-dosekg="0.25">0</span> mg</td>
                <td><span class="ml-out" data-strmg="5" data-strml="5" data-dosekg="0.25">0</span> mL</td>
                <td>OD</td>
            </tr>
        </tbody>
    </table>
</div>

<script>
    function runAllCalculations() {
        // 1. Get Weight
        var w = document.getElementById('weightInput').value;
        var weight = parseFloat(w);

        // 2. Find all mg outputs
        var mgElements = document.getElementsByClassName('mg-out');
        var mlElements = document.getElementsByClassName('ml-out');

        if (isNaN(weight) || weight <= 0) {
            for (var i = 0; i < mgElements.length; i++) {
                mgElements[i].innerHTML = "0";
                mgElements[i].className = "mg-out";
                mlElements[i].innerHTML = "0";
                mlElements[i].className = "ml-out";
            }
            return;
        }

        // 3. Loop through and calculate MG
        for (var i = 0; i < mgElements.length; i++) {
            var doseKg = parseFloat(mgElements[i].getAttribute('data-dosekg'));
            var totalMg = weight * doseKg;
            mgElements[i].innerHTML = totalMg.toFixed(1);
            mgElements[i].className = "mg-out res-mg"; // Add blue styling
        }

        // 4. Loop through and calculate ML
        for (var j = 0; j < mlElements.length; j++) {
            var sMg = parseFloat(mlElements[j].getAttribute('data-strmg'));
            var sMl = parseFloat(mlElements[j].getAttribute('data-strml'));
            var dKg = parseFloat(mlElements[j].getAttribute('data-dosekg'));
            
            var resMg = weight * dKg;
            var resMl = (resMg / sMg) * sMl;
            
            mlElements[j].innerHTML = resMl.toFixed(2);
            mlElements[j].className = "ml-out res-ml"; // Add red styling
        }
    }

    function filterTable() {
        var input = document.getElementById('search').value.toLowerCase();
        var rows = document.getElementsByClassName('drug-row');
        for (var i = 0; i < rows.length; i++) {
            var name = rows[i].getElementsByTagName('td')[0].innerText.toLowerCase();
            rows[i].style.display = name.includes(input) ? "" : "none";
        }
    }
</script>

</body>
</html>
