<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Dose Calculator</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; padding: 20px; color: #333; }
        .container { max-width: 800px; margin: auto; background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.1); }
        h2 { color: #1a73e8; border-bottom: 2px solid #e8f0fe; padding-bottom: 10px; }
        .grid-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        label { display: block; margin-bottom: 5px; font-weight: 600; font-size: 0.9rem; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { background-color: #f8f9fa; color: #5f6368; text-align: left; padding: 12px; border-bottom: 2px solid #dee2e6; }
        td { padding: 12px; border-bottom: 1px solid #eee; }
        .highlight { font-weight: bold; color: #1a73e8; }
        .disclaimer { font-size: 0.8rem; color: #d93025; margin-top: 20px; font-style: italic; }
    </style>
</head>
<body>

<div class="container">
    <h2>Dose Calculator</h2>
    
    <div class="grid-inputs">
        <div>
            <label>Patient Age (Years)</label>
            <input type="number" id="age" placeholder="e.g. 5" oninput="calculate()">
        </div>
        <div>
            <label>Patient Weight (kg)</label>
            <input type="number" id="weight" placeholder="e.g. 20" oninput="calculate()">
        </div>
        <div>
            <label>Required Dosage (mg/kg)</label>
            <input type="number" id="dosage" placeholder="e.g. 15" oninput="calculate()">
        </div>
        <div>
            <label>Concentration (mg/mL)</label>
            <input type="number" id="concentration" placeholder="e.g. 50" oninput="calculate()">
        </div>
    </div>

    <table>
        <thead>
            <tr>
                <th>Dose (mg)</th>
                <th>Dose (mL)</th>
                <th>Frequency</th>
                <th>Notes</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td id="resMg" class="highlight">0 mg</td>
                <td id="resMl" class="highlight">0 mL</td>
                <td>
                    <select id="freq" onchange="calculate()">
                        <option value="Once Daily">Once Daily (OD)</option>
                        <option value="Twice Daily">Twice Daily (BD)</option>
                        <option value="Three times Daily">Three times (TDS)</option>
                        <option value="Every 6 hours">Four times (QID)</option>
                    </select>
                </td>
                <td><input type="text" id="notes" placeholder="e.g. After food"></td>
            </tr>
        </tbody>
    </table>

    <p class="disclaimer">⚠️ For clinical reference only. Always verify calculations manually before administration.</p>
</div>

<script>
    function calculate() {
        const weight = parseFloat(document.getElementById('weight').value);
        const dosage = parseFloat(document.getElementById('dosage').value);
        const concentration = parseFloat(document.getElementById('concentration').value);
        
        if (weight > 0 && dosage > 0 && concentration > 0) {
            const mgResult = weight * dosage;
            const mlResult = mgResult / concentration;

            document.getElementById('resMg').innerText = mgResult.toFixed(1) + " mg";
            document.getElementById('resMl').innerText = mlResult.toFixed(2) + " mL";
        } else {
            document.getElementById('resMg').innerText = "0 mg";
            document.getElementById('resMl').innerText = "0 mL";
        }
    }
</script>

</body>
</html>
