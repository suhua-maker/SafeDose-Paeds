<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KKP9 Paeds Dose Calculator</title>
    <style>
        :root { --primary: #0056b3; --accent: #d93025; --bg: #f8fafc; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); padding: 20px; }
        .container { max-width: 1200px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        
        /* Top Bar */
        .header-bar { display: flex; flex-wrap: wrap; gap: 20px; background: #eef2f7; padding: 25px; border-radius: 10px; align-items: flex-end; margin-bottom: 25px; border: 1px solid #d1d9e6; }
        .field { display: flex; flex-direction: column; gap: 8px; }
        label { font-size: 11px; font-weight: bold; color: #475569; text-transform: uppercase; letter-spacing: 0.5px; }
        input { padding: 12px; border: 2px solid #cbd5e1; border-radius: 8px; font-size: 18px; width: 120px; text-align: center; font-weight: bold; }
        input:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 0 3px rgba(0,86,179,0.1); }

        /* Calculate Button */
        .btn-calculate { background: var(--primary); color: white; border: none; padding: 14px 30px; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 10px; transition: transform 0.1s, background 0.2s; }
        .btn-calculate:hover { background: #004494; }
        .btn-calculate:active { transform: scale(0.97); }

        /* Table */
        .table-container { overflow-x: auto; border-radius: 8px; border: 1px solid #e2e8f0; }
        table { width: 100%; border-collapse: collapse; min-width: 1000px; }
        th { background: var(--primary); color: white; padding: 15px; text-align: left; font-size: 13px; text-transform: uppercase; position: sticky; top: 0; }
        td { padding: 15px; border-bottom: 1px solid #f1f5f9; font-size: 14px; color: #1e293b; }
        tr:nth-child(even) { background: #f8fafc; }
        tr:hover { background: #f1f5f9; }

        /* Calculation Styling */
        .res-mg { font-weight: bold; color: var(--primary); font-size: 1.1em; }
        .res-ml { font-weight: 800; color: var(--accent); background: #fff5f5; padding: 6px 10px; border-radius: 6px; border: 1px solid #fed7d7; font-size: 1.2em; display: inline-block; }
        .med-name { font-weight: bold; color: #0f172a; }
        
        #searchBox { width: 100%; padding: 12px; margin-bottom: 15px; border: 2px solid #e2e8f0; border-radius: 8px; font-size: 15px; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="margin-top:0; color: #1e293b;">Paeds Dose Calculator (KKP9 2025 Ver)</h2>

    <div class="header-bar">
        <div class="field"><label>Weight (kg)</label><input type="number" id="wt" step="0.1" placeholder="0.0"></div>
        <div class="field"><label>Age (Yrs)</label><input type="number" id="ageY" placeholder="0"></div>
        <div class="field"><label>Age (Mths)</label><input type="number" id="ageM" placeholder="0"></div>
        
        <button class="btn-calculate" onclick="runCalc()">
            <span>🔄</span> CALCULATE
        </button>
        
        <button onclick="window.location.reload()" style="background:none; border:none; color:#64748b; text-decoration:underline; cursor:pointer; font-size:14px;">Reset</button>
    </div>

    <input type="text" id="searchBox" placeholder="Search medication name..." onkeyup="filterTable()">

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th style="width: 25%">Medication Name</th>
                    <th>Strength Available</th>
                    <th>Recommended Dose (mg)</th>
                    <th>Recommended Dose (mL)</th>
                    <th>Frequency</th>
                    <th>Notes</th>
                </tr>
            </thead>
            <tbody id="medTableBody">
                </tbody>
        </table>
    </div>
</div>

<script>
    // EXACT DATA AND FORMULAS FROM YOUR EXCEL FILE
    const meds = [
        { name: "Paracetamol Syr", str: "120mg/5mL", mg: 120, ml: 5, doseKg: 15, freq: "TDS/QID", note: "Max 60mg/kg/day" },
        { name: "Paracetamol Forte", str: "250mg/5mL", mg: 250, ml: 5, doseKg: 15, freq: "TDS/QID", note: "Max 4 doses/24h" },
        { name: "Ibuprofen Syr", str: "100mg/5mL", mg: 100, ml: 5, doseKg: 10, freq: "TDS", note: "Post-meal" },
        { name: "Amoxicillin Syr", str: "125mg/5mL", mg: 125, ml: 5, doseKg: 15, freq: "TDS", note: "5-7 days course" },
        { name: "Amoxicillin Forte", str: "250mg/5mL", mg: 250, ml: 5, doseKg: 15, freq: "TDS", note: "Standard dose" },
        { name: "Cloxacillin Syr", str: "125mg/5mL", mg: 125, ml: 5, doseKg: 12.5, freq: "QID", note: "Empty stomach" },
        { name: "Cephalexin Syr", str: "125mg/5mL", mg: 125, ml: 5, doseKg: 12.5, freq: "BD/QID", note: "Skin infections" },
        { name: "Metronidazole Susp", str: "200mg/5mL", mg: 200, ml: 5, doseKg: 7.5, freq: "TDS", note: "Anaerobic infx" },
        { name: "Salbutamol Syrup", str: "2mg/5mL", mg: 2, ml: 5, doseKg: 0.1, freq: "TDS", note: "Monitor HR" },
        { name: "Promethazine Syr", str: "5mg/5mL", mg: 5, ml: 5, doseKg: 0.25, freq: "BD/TDS", note: "Antihistamine" },
        { name: "Chlorpheniramine (CPM)", str: "2mg/5mL", mg: 2, ml: 5, doseKg: 0.1, freq: "TDS", note: "Max 12mg/day" },
        { name: "Cetirizine Syr", str: "5mg/5mL", mg: 5, ml: 5, doseKg: 0.25, freq: "OD", note: "> 6mo old" },
        { name: "Loratadine Syr", str: "5mg/5mL", mg: 5, ml: 5, doseKg: 0.25, freq: "OD", note: "> 2yrs old" },
        { name: "Guaiphenesin Syr", str: "100mg/5mL", mg: 100, ml: 5, doseKg: 5, freq: "TDS", note: "Expectorant" },
        { name: "Dextromethorphan Syr", str: "15mg/5mL", mg: 15, ml: 5, doseKg: 0.2, freq: "TDS", note: "Antitussive" }
    ];

    function init() {
        const body = document.getElementById('medTableBody');
        body.innerHTML = meds.map((m, i) => `
            <tr class="med-row">
                <td class="med-name">${m.name}</td>
                <td>${m.str}</td>
                <td class="res-mg"><span id="mg-${i}">0</span> mg</td>
                <td class="res-ml"><span id="ml-${i}">0</span> mL</td>
                <td>${m.freq}</td>
                <td><small>${m.note}</small></td>
            </tr>
        `).join('');
    }

    function runCalc() {
        const w = parseFloat(document.getElementById('wt').value);
        if (isNaN(w) || w <= 0) {
            alert("Please key in weight first!");
            return;
        }

        meds.forEach((m, i) => {
            // Formula for MG: Weight * doseKg
            const finalMg = w * m.doseKg;
            
            // Formula for ML: (FinalMg / StrengthMg) * StrengthMl
            const finalMl = (finalMg / m.mg) * m.ml;

            document.getElementById(`mg-${i}`).innerText = finalMg.toFixed(1);
            document.getElementById(`ml-${i}`).innerText = finalMl.toFixed(2);
        });
    }

    function filterTable() {
        const input = document.getElementById("searchBox").value.toLowerCase();
        const rows = document.querySelectorAll(".med-row");
        rows.forEach(row => {
            const text = row.querySelector(".med-name").innerText.toLowerCase();
            row.style.display = text.includes(input) ? "" : "none";
        });
    }

    window.onload = init;
</script>

</body>
</html>
