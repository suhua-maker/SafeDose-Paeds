<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>KKP9 Paeds Dose 2025</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background-color: #f0f2f5; }
        .wrapper { max-width: 900px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .input-box { display: flex; gap: 20px; background: #eef2f7; padding: 20px; border-radius: 8px; margin-bottom: 20px; align-items: center; }
        .status-ok { color: green; font-weight: bold; font-size: 12px; margin-bottom: 10px; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #0056b3; color: white; padding: 12px; text-align: left; }
        td { padding: 12px; border-bottom: 1px solid #ddd; }
        .result-mg { color: #0056b3; font-weight: bold; font-size: 1.2em; }
        .result-ml { color: #d93025; font-weight: bold; font-size: 1.4em; background: #fff5f5; padding: 4px; border-radius: 4px; }
        input[type="number"] { padding: 10px; width: 100px; font-size: 18px; border: 2px solid #0056b3; }
        #searchBar { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ccc; }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="status-ok">● System Ready (Script Loaded)</div>
    <h2>KKP9 Pediatric Dose Calculator</h2>
    
    <div class="input-box">
        <div>
            <label style="display:block; font-size:12px;">WEIGHT (kg)</label>
            <input type="number" id="MAIN_WEIGHT" step="0.1" placeholder="0.0" oninput="calculateNow()">
        </div>
        <div>
            <label style="display:block; font-size:12px;">AGE (Years)</label>
            <input type="number" id="AGE_Y" placeholder="0">
        </div>
        <button onclick="window.location.reload()">Reset All</button>
    </div>

    <input type="text" id="searchBar" placeholder="Search drug name..." onkeyup="filterList()">

    <table>
        <thead>
            <tr>
                <th>Medication</th>
                <th>Strength</th>
                <th>Dose (mg)</th>
                <th>Dose (mL)</th>
            </tr>
        </thead>
        <tbody id="DRUG_TABLE">
            <tr class="drug-item" data-mg="250" data-ml="5" data-dosekg="15">
                <td><b>Paracetamol 250</b></td>
                <td>250mg/5mL</td>
                <td><span class="out-mg">0</span> mg</td>
                <td><span class="out-ml">0</span> mL</td>
            </tr>
            <tr class="drug-item" data-mg="100" data-ml="5" data-dosekg="10">
                <td><b>Ibuprofen</b></td>
                <td>100mg/5mL</td>
                <td><span class="out-mg">0</span> mg</td>
                <td><span class="out-ml">0</span> mL</td>
            </tr>
            <tr class="drug-item" data-mg="125" data-ml="5" data-dosekg="15">
                <td><b>Amoxicillin 125</b></td>
                <td>125mg/5mL</td>
                <td><span class="out-mg">0</span> mg</td>
                <td><span class="out-ml">0</span> mL</td>
            </tr>
            <tr class="drug-item" data-mg="2" data-ml="5" data-dosekg="0.1">
                <td><b>Chlorpheniramine</b></td>
                <td>2mg/5mL</td>
                <td><span class="out-mg">0</span> mg</td>
                <td><span class="out-ml">0</span> mL</td>
            </tr>
        </tbody>
    </table>
</div>

<script>
    function calculateNow() {
        // Get the weight from input
        var weightValue = document.getElementById('MAIN_WEIGHT').value;
        var w = parseFloat(weightValue);

        // Get all rows
        var rows = document.getElementsByClassName('drug-item');

        if (isNaN(w) || w <= 0) {
            // Reset to 0 if weight is empty
            for (var i = 0; i < rows.length; i++) {
                rows[i].querySelector('.out-mg').innerHTML = "0";
                rows[i].querySelector('.out-ml').innerHTML = "0";
            }
            return;
        }

        // Loop through each row and do math
        for (var j = 0; j < rows.length; j++) {
            var strengthMg = parseFloat(rows[j].getAttribute('data-mg'));
            var strengthMl = parseFloat(rows[j].getAttribute('data-ml'));
            var mgPerKg = parseFloat(rows[j].getAttribute('data-dosekg'));

            // The Math
            var finalMg = w * mgPerKg;
            var finalMl = (finalMg / strengthMg) * strengthMl;

            // Update the display
            rows[j].querySelector('.out-mg').innerHTML = finalMg.toFixed(1);
            rows[j].querySelector('.out-mg').className = "out-mg result-mg";
            
            rows[j].querySelector('.out-ml').innerHTML = finalMl.toFixed(2);
            rows[j].querySelector('.out-ml').className = "out-ml result-ml";
        }
    }

    function filterList() {
        var searchTerm = document.getElementById('searchBar').value.toLowerCase();
        var rows = document.getElementsByClassName('drug-item');
        for (var k = 0; k < rows.length; k++) {
            var drugName = rows[k].getElementsByTagName('td')[0].innerText.toLowerCase();
